<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Backgammon" />
<meta name="theme-color" content="#2d1f16" />
<link id="pwaManifest" rel="manifest" />
<title>Backgammon</title>
<style>
  :root {
    --wood-frame: #2d1f16;
    --wood-field: #1e3d30; /* Rich luxury green felt */
    --point-light: #eaddca; /* Elegant cream wool felt */
    --point-dark: #b85a3a;  /* Warm terracotta felt */
    --checker-white: radial-gradient(circle at 35% 35%, #ffffff 0%, #f4f0ea 50%, #dcd5c9 100%);
    --checker-red: radial-gradient(circle at 35% 35%, #ff5252 0%, #cc1111 60%, #880000 100%);
    --bg-dark: #150e0a;
  }
  
  * { 
    box-sizing: border-box; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: var(--bg-dark);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #f5f5f7;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* Core Layout Container scaled perfectly for iOS viewports */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: env(safe-area-inset-top, 10px) env(safe-area-inset-right, 10px) env(safe-area-inset-bottom, 10px) env(safe-area-inset-left, 10px);
    gap: 6px;
    justify-content: space-between;
  }

  /* Two-Row Premium Mobile Toolbar */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  
  .toolbar-row1 {
    display: flex;
    gap: 6px;
    height: 40px;
    align-items: stretch;
  }
  
  .toolbar-row2 {
    display: flex;
    gap: 6px;
    height: 38px;
  }

  .status {
    flex: 1;
    padding: 0 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: #e5e5ea;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .dice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 10px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  
  .dice span {
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  button {
    flex: 1;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  button:active {
    transform: scale(0.98);
  }

  button.primary { 
    background: #007af5; 
    color: #ffffff;
    box-shadow: 0 2px 6px rgba(0,122,245,0.3);
  }
  button.primary:disabled {
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.2);
    box-shadow: none;
  }
  
  button.reset { 
    background: rgba(255, 255, 255, 0.1); 
    color: #ff453a; 
    border: 1px solid rgba(255, 45, 58, 0.15);
  }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Dynamic Luxury Board Setup */
  .board {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    gap: 2px;
    background: var(--wood-frame);
    padding: 6px;
    border-radius: 14px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 8px 24px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .row {
    display: grid;
    grid-template-columns: repeat(6, 1fr) 12px repeat(6, 1fr);
    gap: 1px;
    min-height: 0;
    background: var(--wood-field);
    border-radius: 6px;
    overflow: hidden;
  }

  .center-bar {
    background: var(--wood-frame);
    box-shadow: inset 2px 0 5px rgba(0,0,0,0.4), inset -2px 0 5px rgba(0,0,0,0.4);
  }

  /* Sharp Geometric Triangles using Pseudo-elements */
  .point {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-width: 0;
    min-height: 0;
    padding: 14px 1px 2px;
    overflow: visible;
  }
  
  .point::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
  }
  
  .point.top { flex-direction: column; }
  .point.top::before { clip-path: polygon(0 0, 100% 0, 50% 100%); height: 85%; }
  
  .point.bottom { flex-direction: column-reverse; padding: 2px 1px 14px; }
  .point.bottom::before { clip-path: polygon(50% 0, 100% 100%, 0 100%); bottom: 0; top: auto; height: 85%; }
  
  .point.dark::before { background: var(--point-dark); }
  .point.light::before { background: var(--point-light); }
  
  /* State Highlighting Styles */
  .point.selected { background: rgba(0, 122, 245, 0.25) !important; box-shadow: inset 0 0 0 2px #007af5; z-index: 2; }
  .point.legal-move { background: rgba(48, 209, 88, 0.25) !important; box-shadow: inset 0
