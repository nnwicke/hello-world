<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Backgammon" />
<meta name="theme-color" content="#231710" />
<link id="pwaManifest" rel="manifest" />
<title>Backgammon standalone</title>
<style>
  :root {
    --wood-frame: #231710;
    --wood-field: #143224;  /* Deep high-contrast luxury emerald felt */
    --point-light: #e6dacb; /* Crisp premium cream felt */
    --point-dark: #b04a29;  /* Rich terracotta felt */
    --checker-white: radial-gradient(circle at 35% 35%, #ffffff 0%, #eae4da 50%, #cfc5b4 100%);
    --checker-red: radial-gradient(circle at 35% 35%, #ff4d4d 0%, #b80c0c 60%, #730000 100%);
    --bg-dark: #0f0a07;
  }
  
  * { 
    box-sizing: border-box; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: var(--bg-dark);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    color: #f5f5f7;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* Robust layout shell with complete iOS Safari fallback units */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: env(safe-area-inset-top, 10px) env(safe-area-inset-right, 10px) env(safe-area-inset-bottom, 10px) env(safe-area-inset-left, 10px);
    gap: 6px;
    justify-content: space-between;
  }

  /* Two-Row Premium Mobile Toolbar Grid */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  
  .toolbar-row1 {
    display: flex;
    gap: 6px;
    height: 40px;
    align-items: stretch;
  }
  
  .toolbar-row2 {
    display: flex;
    gap: 6px;
    height: 38px;
  }

  .status {
    flex: 1;
    padding: 0 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: #e5e5ea;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
  }

  .dice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 10px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  button {
    flex: 1;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  button:active {
    transform: scale(0.98);
  }

  button.primary { 
    background: #007af5; 
    color: #ffffff;
    box-shadow: 0 2px 6px rgba(0,122,245,0.3);
  }
  button.primary:disabled {
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.2);
    box-shadow: none;
  }
  
  button.reset { 
    background: rgba(255, 255, 255, 0.1); 
    color: #ff453a; 
    border: 1px solid rgba(255, 45, 58, 0.15);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Premium Wood Frame Board Wrapper */
  .board {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    gap: 2px;
    background: var(--wood-frame);
    padding: 6px;
    border-radius: 14px;
    box-shadow: inset 0
